spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:user-db}:${DB_PORT:5432}/${DB_NAME:user_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update # Tránh làm mất dữ liệu thật khi restart container
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

# Khi chạy trong Docker network, các container gọi nhau bằng tên Service trong Docker-compose
eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/