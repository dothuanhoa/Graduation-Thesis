spring:
  application:
    name: user-service
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 120000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true

server:
  port: 8081

app:
  student:
    email-domain: ${STUDENT_EMAIL_DOMAIN:student.edu.vn}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
