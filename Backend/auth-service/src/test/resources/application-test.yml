spring:
  datasource:
    url: jdbc:h2:mem:auth_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

app:
  jwt:
    secret: bXktdGVzdC1qd3Qtc2VjcmV0LW15LXRlc3Qtand0LXNlY3JldA==
  internal:
    secret: test-internal-service-secret
  gateway:
    secret: test-gateway-internal-secret
