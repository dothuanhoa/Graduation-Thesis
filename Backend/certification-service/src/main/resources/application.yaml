spring:
  application:
    name: certification-service
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true

server:
  port: 8085

app:
  upload:
    dir: ${APP_UPLOAD_DIR:../../Frontend/user-frontend/public/certification}
    public-url-prefix: ${APP_UPLOAD_PUBLIC_URL_PREFIX:/certification}
    max-size-bytes: ${APP_UPLOAD_MAX_SIZE_BYTES:10485760}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
